services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root123
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: development
      PORT: 8000
      MONGODB_URL: mongodb://root:root123@mongo:27017/clinic_mgmt?authSource=admin
      REDIS_URL: redis://redis:6379
      ACCESS_TOKEN_SECRET: dev-access-secret-change-in-production
      REFRESH_TOKEN_SECRET: dev-refresh-secret-change-in-production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: http://localhost:8000/api/v1/auth/google/callback
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MAILTRAP_SMTP_HOST: sandbox.smtp.mailtrap.io
      MAILTRAP_SMTP_PORT: 2525
      MAILTRAP_SMTP_USER: ${MAILTRAP_SMTP_USER}
      MAILTRAP_SMTP_PASS: ${MAILTRAP_SMTP_PASS}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      QDRANT_URL: http://localhost:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      FRONTEND_URL: http://localhost:3000,http://localhost:5173,https://ai-clininc-sdd-ten.vercel.app
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  mongo-express:
    image: mongo-express:1.0
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: root123
      ME_CONFIG_MONGODB_URL: mongodb://root:root123@mongo:27017/
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data:
